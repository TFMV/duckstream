<svg width="320" height="120" viewBox="0 0 320 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="streamGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Duck (minimal, geometric) -->
  <g transform="translate(20,30)">
    <!-- Body -->
    <ellipse cx="40" cy="30" rx="28" ry="20" fill="#facc15"/>
    
    <!-- Head -->
    <circle cx="70" cy="18" r="14" fill="#facc15"/>
    
    <!-- Beak -->
    <polygon points="82,18 100,24 82,30" fill="#fb923c"/>
    
    <!-- Eye -->
    <circle cx="72" cy="16" r="2.5" fill="#111827"/>
  </g>

  <!-- Stream lines -->
  <g transform="translate(110,50)" stroke="url(#streamGradient)" stroke-width="3" fill="none">
    <path d="M0 10 C 30 0, 60 20, 90 10" />
    <path d="M0 20 C 30 10, 60 30, 90 20" opacity="0.7"/>
    <path d="M0 30 C 30 20, 60 40, 90 30" opacity="0.4"/>
  </g>

  <!-- Text -->
  <text x="110" y="95" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="600" fill="#111827">
    DuckStream
  </text>
</svg>
