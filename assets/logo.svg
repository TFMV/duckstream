<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="540" height="170" viewBox="0 0 540 170">
  <!-- Duck icon -->
  
  <!-- Body -->
  <ellipse 
    cx="85" 
    cy="105" 
    rx="42" 
    ry="33" 
    fill="#FFCB1F" 
    stroke="#26334A" 
    stroke-width="8" />

  <!-- Head -->
  <ellipse 
    cx="123" 
    cy="70" 
    rx="28" 
    ry="29" 
    fill="#FFCB1F" 
    stroke="#26334A" 
    stroke-width="8" />

  <!-- Beak -->
  <polygon 
    points="148,57 177,70 148,80" 
    fill="#FF7F00" 
    stroke="#26334A" 
    stroke-width="4" />

  <!-- Eye -->
  <circle 
    cx="130" 
    cy="63" 
    r="9" 
    fill="#FEFEFE" />

  <!-- Pupil -->
  <circle 
    cx="131.5" 
    cy="63" 
    r="4" 
    fill="#26334A" />

  <!-- Wing -->
  <ellipse 
    cx="50" 
    cy="105" 
    rx="23" 
    ry="19" 
    fill="#FFAF00" 
    stroke="#26334A" 
    stroke-width="5" 
    transform="rotate(-40 85 105)" />

  <!-- Text: DuckStream -->
  
  <!-- "Duck" in bright yellow -->
  <text 
    x="185" 
    y="115" 
    font-family="Arial Black, sans-serif" 
    font-size="52" 
    font-weight="700" 
    fill="#FFCB1F" 
    letter-spacing="-1px">Duck</text>

  <!-- "Stream" in vibrant streaming blue - moved further right -->
  <text 
    x="325" 
    y="115" 
    font-family="Arial Black, sans-serif" 
    font-size="52" 
    font-weight="700" 
    fill="#00B8E0" 
    letter-spacing="-2px">Stream</text>

</svg>