<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuckStream Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
            min-height: 100vh;
        }
        
        .container {
            display: grid;
            grid-template-rows: auto 1fr auto;
            min-height: 100vh;
            max-width: 100vw;
        }
        
        header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 18px;
            font-weight: bold;
            color: #58a6ff;
        }
        
        .logo span {
            color: #7ee787;
        }
        
        .status-bar {
            display: flex;
            gap: 20px;
            font-size: 12px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #7ee787;
        }
        
        .status-dot.disconnected {
            background: #f85149;
        }
        
        .main-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 1px;
            background: #30363d;
        }
        
        .panel {
            background: #0d1117;
            padding: 16px;
            overflow: auto;
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #30363d;
        }
        
        .panel-title {
            font-size: 14px;
            font-weight: bold;
            color: #58a6ff;
        }
        
        .query-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .query-input {
            width: 100%;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px;
            color: #c9d1d9;
            font-family: inherit;
            font-size: 12px;
            resize: vertical;
            min-height: 80px;
        }
        
        .query-input:focus {
            outline: none;
            border-color: #58a6ff;
        }
        
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #238636;
            color: #fff;
        }
        
        .btn-primary:hover {
            background: #2ea043;
        }
        
        .btn-danger {
            background: #da3633;
            color: #fff;
        }
        
        .btn-danger:hover {
            background: #f85149;
        }
        
        .btn-secondary {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
        }
        
        .btn-secondary:hover {
            background: #30363d;
        }
        
        .query-list {
            margin-top: 20px;
        }
        
        .query-item {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .query-item:hover {
            border-color: #58a6ff;
        }
        
        .query-item.active {
            border-color: #7ee787;
        }
        
        .query-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .query-id {
            font-weight: bold;
            color: #58a6ff;
        }
        
        .query-status {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            background: #238636;
            color: #fff;
        }
        
        .query-sql {
            font-size: 11px;
            color: #8b949e;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .query-stats {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            font-size: 11px;
            color: #8b949e;
        }
        
        .stream-viewer {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .stream-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .stream-tab {
            padding: 6px 12px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            color: #8b949e;
        }
        
        .stream-tab.active {
            border-color: #58a6ff;
            color: #58a6ff;
        }
        
        .stream-tab .close {
            margin-left: 8px;
            color: #f85149;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        
        .data-table th {
            text-align: left;
            padding: 8px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            color: #58a6ff;
            position: sticky;
            top: 0;
        }
        
        .data-table td {
            padding: 6px 8px;
            border-bottom: 1px solid #21262d;
        }
        
        .data-table tr.new-row {
            animation: highlight 1s ease-out;
        }
        
        @keyframes highlight {
            from { background: #1f6feb22; }
            to { background: transparent; }
        }
        
        .data-table tr:hover td {
            background: #161b22;
        }
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: #8b949e;
        }
        
        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .event-feed {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .event-item {
            padding: 8px;
            background: #161b22;
            border-radius: 4px;
            margin-bottom: 6px;
            font-size: 11px;
        }
        
        .event-time {
            color: #8b949e;
            margin-bottom: 4px;
        }
        
        .event-data {
            color: #7ee787;
            font-family: monospace;
        }
        
        .ingestion-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 16px;
        }
        
        .stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #58a6ff;
        }
        
        .stat-label {
            font-size: 11px;
            color: #8b949e;
            margin-top: 4px;
        }
        
        .actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #0d1117;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #484f58;
        }

        .select-input {
            width: 100%;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 8px;
            color: #c9d1d9;
            font-family: inherit;
            font-size: 12px;
        }

        .select-input:focus {
            outline: none;
            border-color: #58a6ff;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;
        
        const API_BASE = '';
        
        function App() {
            const [queries, setQueries] = useState([]);
            const [metrics, setMetrics] = useState({
                queries_registered: 0,
                queries_unregistered: 0,
                rows_sent: 0,
                errors: 0,
                active_clients: 0,
                active_queries: 0
            });
            const [connected, setConnected] = useState(false);
            const [startTime] = useState(new Date());
            const [queryInput, setQueryInput] = useState('REGISTER QUERY q1 AS SELECT * FROM events');
            const [selectedQuery, setSelectedQuery] = useState(null);
            const [queryData, setQueryData] = useState({});
            const [eventFeed, setEventFeed] = useState([]);
            const [ingestionRate, setIngestionRate] = useState(0);
            
            const metricsRef = useRef(null);
            
            useEffect(() => {
                fetchMetrics();
                const interval = setInterval(fetchMetrics, 1000);
                return () => clearInterval(interval);
            }, []);
            
            useEffect(() => {
                fetchQueries();
                const interval = setInterval(fetchQueries, 2000);
                return () => clearInterval(interval);
            }, []);
            
            useEffect(() => {
                if (selectedQuery) {
                    startQueryStream(selectedQuery);
                }
            }, [selectedQuery]);
            
            const fetchMetrics = async () => {
                try {
                    const res = await fetch(`${API_BASE}/metrics`);
                    const data = await res.json();
                    setMetrics(data);
                    setConnected(true);
                } catch (e) {
                    setConnected(false);
                }
            };
            
            const fetchQueries = async () => {
                try {
                    const res = await fetch(`${API_BASE}/queries`);
                    const data = await res.json();
                    setQueries(data.queries || []);
                } catch (e) {
                    console.error('Failed to fetch queries:', e);
                }
            };
            
            const registerQuery = async () => {
                const match = queryInput.match(/REGISTER QUERY\s+(\w+)\s+AS\s+(.+)/i);
                if (!match) {
                    alert('Invalid format. Use: REGISTER QUERY <id> AS <sql>');
                    return;
                }
                
                const id = match[1];
                const sql = match[2];
                
                try {
                    const res = await fetch(`${API_BASE}/queries`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id, sql })
                    });
                    
                    if (!res.ok) {
                        const err = await res.text();
                        alert(`Failed: ${err}`);
                        return;
                    }
                    
                    setQueryInput('');
                    fetchQueries();
                    setSelectedQuery(id);
                } catch (e) {
                    alert(`Error: ${e.message}`);
                }
            };
            
            const unregisterQuery = async (id) => {
                try {
                    await fetch(`${API_BASE}/queries/${id}`, { method: 'DELETE' });
                    fetchQueries();
                    if (selectedQuery === id) {
                        setSelectedQuery(null);
                    }
                } catch (e) {
                    alert(`Error: ${e.message}`);
                }
            };
            
            const startQueryStream = (queryId) => {
                const existing = queryData[queryId] || [];
                
                const simulateData = () => {
                    const newRows = generateMockRows(queryId);
                    if (newRows.length > 0) {
                        setQueryData(prev => ({
                            ...prev,
                            [queryId]: [...(prev[queryId] || []), ...newRows].slice(-100)
                        }));
                    }
                };
                
                const interval = setInterval(simulateData, 1000 + Math.random() * 2000);
                
                return () => clearInterval(interval);
            };
            
            const generateMockRows = (queryId) => {
                const types = ['click', 'view', 'scroll', 'hover'];
                const pages = ['/home', '/about', '/contact', '/products', '/blog'];
                
                return Array.from({ length: Math.floor(Math.random() * 3) + 1 }, () => ({
                    id: Math.floor(Math.random() * 10000) + 1,
                    data: JSON.stringify({
                        event: types[Math.floor(Math.random() * types.length)],
                        x: Math.floor(Math.random() * 500),
                        y: Math.floor(Math.random() * 500),
                        page: pages[Math.floor(Math.random() * pages.length)]
                    }),
                    timestamp: new Date().toISOString()
                }));
            };
            
            const addEvent = useCallback((event) => {
                setEventFeed(prev => [event, ...prev].slice(0, 50));
            }, []);
            
            useEffect(() => {
                const interval = setInterval(() => {
                    if (queries.length > 0) {
                        const newEvent = {
                            timestamp: new Date().toISOString(),
                            data: JSON.stringify({
                                event: ['click', 'view', 'scroll'][Math.floor(Math.random() * 3)],
                                x: Math.floor(Math.random() * 500),
                                y: Math.floor(Math.random() * 500)
                            })
                        };
                        addEvent(newEvent);
                        setIngestionRate(Math.floor(Math.random() * 20) + 5);
                    }
                }, 1000);
                
                return () => clearInterval(interval);
            }, [queries.length, addEvent]);
            
            const uptime = Math.floor((new Date() - startTime) / 1000);
            const formatUptime = (s) => {
                const h = Math.floor(s / 3600);
                const m = Math.floor((s % 3600) / 60);
                const sec = s % 60;
                return `${h}h ${m}m ${sec}s`;
            };
            
            return (
                <div className="container">
                    <header>
                        <div className="logo">Duck<span>Stream</span></div>
                        <div className="status-bar">
                            <div className="status-item">
                                <div className={`status-dot ${connected ? '' : 'disconnected'}`}></div>
                                <span>{connected ? 'Connected' : 'Disconnected'}</span>
                            </div>
                            <div className="status-item">
                                <span>Clients: {metrics.active_clients || 0}</span>
                            </div>
                            <div className="status-item">
                                <span>Queries: {queries.length}</span>
                            </div>
                            <div className="status-item">
                                <span>Uptime: {formatUptime(uptime)}</span>
                            </div>
                        </div>
                    </header>
                    
                    <div className="main-grid">
                        <div className="panel">
                            <div className="panel-header">
                                <span className="panel-title">Query Control</span>
                            </div>
                            
                            <div className="query-form">
                                <textarea 
                                    className="query-input"
                                    value={queryInput}
                                    onChange={(e) => setQueryInput(e.target.value)}
                                    placeholder="REGISTER QUERY q1 AS SELECT * FROM events"
                                />
                                <div className="actions">
                                    <button className="btn btn-primary" onClick={registerQuery}>
                                        Register
                                    </button>
                                    <button className="btn btn-secondary" onClick={() => setQueryInput('')}>
                                        Clear
                                    </button>
                                </div>
                            </div>
                            
                            <div className="query-list">
                                {queries.length === 0 ? (
                                    <div className="empty-state">
                                        <p>No active queries</p>
                                        <p style={{fontSize: 11, marginTop: 8}}>Register a query to start streaming</p>
                                    </div>
                                ) : (
                                    queries.map(q => (
                                        <div 
                                            key={q.id} 
                                            className={`query-item ${selectedQuery === q.id ? 'active' : ''}`}
                                            onClick={() => setSelectedQuery(q.id)}
                                        >
                                            <div className="query-item-header">
                                                <span className="query-id">{q.id}</span>
                                                <span className="query-status">{q.active ? 'running' : 'stopped'}</span>
                                            </div>
                                            <div className="query-sql">{q.sql}</div>
                                            <div className="query-stats">
                                                <span>Rows: {queryData[q.id]?.length || 0}</span>
                                                <button 
                                                    className="btn btn-danger" 
                                                    style={{padding: '2px 8px', fontSize: 10}}
                                                    onClick={(e) => { e.stopPropagation(); unregisterQuery(q.id); }}
                                                >
                                                    Unregister
                                                </button>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                            
                            <div className="panel-header" style={{marginTop: 24}}>
                                <span className="panel-title">Event Ingestion</span>
                            </div>
                            
                            <div className="event-feed">
                                {eventFeed.map((e, i) => (
                                    <div key={i} className="event-item">
                                        <div className="event-time">{new Date(e.timestamp).toLocaleTimeString()}</div>
                                        <div className="event-data">{e.data}</div>
                                    </div>
                                ))}
                            </div>
                            
                            <div className="ingestion-stats">
                                <div className="stat-card">
                                    <div className="stat-value">{ingestionRate}</div>
                                    <div className="stat-label">Events/sec</div>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-value">{eventFeed.length}</div>
                                    <div className="stat-label">Total Events</div>
                                </div>
                            </div>
                        </div>
                        
                        <div className="panel">
                            <div className="panel-header">
                                <span className="panel-title">Live Stream Viewer</span>
                            </div>
                            
                            <div className="stream-viewer">
                                {!selectedQuery ? (
                                    <div className="empty-state">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                            <polyline points="17 8 12 3 7 8"/>
                                            <line x1="12" y1="3" x2="12" y2="15"/>
                                        </svg>
                                        <p>Select a query to view its stream</p>
                                    </div>
                                ) : (
                                    <>
                                        <div className="stream-tabs">
                                            {queries.filter(q => queryData[q.id]?.length > 0).map(q => (
                                                <div 
                                                    key={q.id} 
                                                    className={`stream-tab ${selectedQuery === q.id ? 'active' : ''}`}
                                                    onClick={() => setSelectedQuery(q.id)}
                                                >
                                                    {q.id}
                                                    <span 
                                                        className="close"
                                                        onClick={(e) => { e.stopPropagation(); setSelectedQuery(null); }}
                                                    >
                                                        ×
                                                    </span>
                                                </div>
                                            ))}
                                        </div>
                                        
                                        <div style={{flex: 1, overflow: 'auto'}}>
                                            <table className="data-table">
                                                <thead>
                                                    <tr>
                                                        <th>ID</th>
                                                        <th>Data</th>
                                                        <th>Timestamp</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {(queryData[selectedQuery] || []).slice().reverse().map((row, i) => (
                                                        <tr key={i} className={i === 0 ? 'new-row' : ''}>
                                                            <td>{row.id}</td>
                                                            <td>{row.data}</td>
                                                            <td>{row.timestamp}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
